    // ============ Website Diagnostics ============
    function renderDiagnostics() {
        const diag = STATE.diagnostics;
        if (!diag) {
            return `
            <div class="diag-section">
                <h2 class="section-title">網站 AI 診斷</h2>
                <div class="card"><div class="diag-loading"><span class="spinner"></span>正在分析 ${escapeHtml(STATE.websiteUrl)}...</div></div>
            </div>`;
        }
        if (diag.error) {
            return `
            <div class="diag-section">
                <h2 class="section-title">網站 AI 診斷</h2>
                <div class="card"><div style="padding:16px;color:var(--red);font-size:14px">⚠ 診斷失敗：${escapeHtml(diag.error)}</div></div>
            </div>`;
        }
        return `
            ${renderCrawlerCheck(diag)}
            ${renderCitabilityScore(diag)}
            ${renderLlmsTxtStatus(diag)}
        `;
    }

    function renderCrawlerCheck(diag) {
        const cc = diag.crawler_check;
        if (!cc) return '';
        const crawlers = cc.crawlers || [];
        const score = cc.score || 0;
        const scoreColor = score >= 70 ? 'var(--neon-green)' : score >= 40 ? 'var(--amber)' : 'var(--red)';

        const tier1 = crawlers.filter(c => c.tier === 1);
        const tier2 = crawlers.filter(c => c.tier === 2);
        const tier3 = crawlers.filter(c => c.tier === 3);

        function renderCrawlerTier(label, items) {
            if (!items.length) return '';
            return `
                <div class="crawler-tier">${label}</div>
                <div class="crawler-grid">
                    ${items.map(c => `
                    <div class="crawler-item">
                        <div class="crawler-dot ${c.status}"></div>
                        <div class="crawler-info">
                            <div class="crawler-name">${escapeHtml(c.name)}</div>
                            <div class="crawler-meta">${escapeHtml(c.operator)} · ${escapeHtml(c.purpose)}</div>
                        </div>
                    </div>`).join('')}
                </div>`;
        }

        const statusLabels = { allowed: '✓ 允許', blocked: '✗ 封鎖', allowed_default: '○ 未設定（預設允許）' };
        const allowed = crawlers.filter(c => c.status === 'allowed').length;
        const blocked = crawlers.filter(c => c.status === 'blocked').length;

        return `
        <div class="diag-section">
            <h2 class="section-title">AI 爬蟲存取狀態</h2>
            <p class="section-desc">檢查 ${escapeHtml(STATE.websiteUrl)} 的 robots.txt，確認哪些 AI 平台的爬蟲被允許或封鎖存取你的網站。</p>
            <div class="card mb-40">
                <div class="crawler-score">
                    <div class="crawler-score-num" style="color:${scoreColor}">${score}</div>
                    <div>
                        <div class="crawler-score-label">AI 爬蟲友善度分數</div>
                        <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px">${allowed} 允許 · ${blocked} 封鎖 · ${crawlers.length - allowed - blocked} 未設定</div>
                    </div>
                </div>
                ${renderCrawlerTier('Tier 1 — AI 搜尋引擎（最重要）', tier1)}
                ${renderCrawlerTier('Tier 2 — 主要科技公司 AI', tier2)}
                ${renderCrawlerTier('Tier 3 — 訓練資料爬蟲', tier3)}
            </div>
        </div>`;
    }

    function renderCitabilityScore(diag) {
        const cit = diag.citability;
        if (!cit) return '';
        const avg = cit.average_score || 0;
        const total = cit.total_blocks || 0;
        const grades = cit.grade_distribution || {};
        const top = cit.top_blocks || [];
        const bottom = cit.bottom_blocks || [];

        const circumference = 2 * Math.PI * 42;
        const dashOffset = circumference * (1 - avg / 100);
        const scoreColor = avg >= 70 ? 'var(--neon-green)' : avg >= 40 ? 'var(--amber)' : 'var(--red)';

        const dimMaxes = { answer_block_quality: 30, self_containment: 25, structural_readability: 20, statistical_density: 15, uniqueness_signals: 10 };
        const dimLabels = { answer_block_quality: '回答品質', self_containment: '自含性', structural_readability: '結構可讀性', statistical_density: '數據密度', uniqueness_signals: '獨特性' };

        function renderBlock(block, showDims) {
            const gradeClass = 'grade-' + block.grade;
            return `
            <div class="citability-block">
                <div class="citability-block-header">
                    <span class="citability-block-title">${escapeHtml(block.heading)}</span>
                    <span class="citability-block-grade ${gradeClass}" style="background:rgba(255,255,255,0.05)">${block.grade} · ${block.total_score}分 · ${block.word_count}字</span>
                </div>
                ${showDims && block.breakdown ? Object.entries(block.breakdown).map(([dim, val]) => `
                <div class="citability-dim">
                    <span class="citability-dim-label">${dimLabels[dim] || dim}</span>
                    <div class="citability-dim-bar"><div class="citability-dim-fill" style="width:${(val / (dimMaxes[dim] || 30) * 100).toFixed(0)}%"></div></div>
                    <span class="citability-dim-val">${val}/${dimMaxes[dim] || '?'}</span>
                </div>`).join('') : ''}
                <div class="citability-block-preview">${escapeHtml(block.preview || '')}</div>
            </div>`;
        }

        return `
        <div class="diag-section">
            <h2 class="section-title">內容可引用性評分 (Citability)</h2>
            <p class="section-desc">分析頁面每個內容區塊被 AI 引用的可能性，基於 5 個維度評分：回答品質、自含性、結構可讀性、數據密度、獨特性。</p>
            <div class="card mb-40">
                <div class="citability-header">
                    <div class="citability-score-ring">
                        <svg width="100" height="100" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
                            <circle cx="50" cy="50" r="42" fill="none" stroke="${scoreColor}" stroke-width="8"
                                stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
                        </svg>
                        <div class="citability-score-val">${avg.toFixed(0)}</div>
                    </div>
                    <div class="citability-stats">
                        <div class="citability-stats-row"><span style="color:var(--text-tertiary)">頁面網址</span><span>${escapeHtml(cit.url || STATE.websiteUrl)}</span></div>
                        <div class="citability-stats-row"><span style="color:var(--text-tertiary)">內容區塊數</span><span>${total}</span></div>
                        <div class="citability-stats-row"><span style="color:var(--text-tertiary)">平均分數</span><span style="color:${scoreColor};font-weight:700">${avg.toFixed(1)} / 100</span></div>
                        <div class="citability-stats-row"><span style="color:var(--text-tertiary)">最佳字數區塊</span><span>${cit.optimal_length_count || 0} 個</span></div>
                    </div>
                </div>

                <div class="citability-grade-dist">
                    ${['A','B','C','D','F'].map(g => `
                    <div class="citability-grade">
                        <div class="citability-grade-letter grade-${g}">${g}</div>
                        <div class="citability-grade-count">${grades[g] || 0}</div>
                    </div>`).join('')}
                </div>

                ${top.length ? `<div class="crawler-tier" style="margin-top:20px">表現最佳區塊</div>` : ''}
                ${top.map(b => renderBlock(b, true)).join('')}

                ${bottom.length ? `<div class="crawler-tier" style="margin-top:20px">需要改善的區塊</div>` : ''}
                ${bottom.map(b => renderBlock(b, false)).join('')}
            </div>
        </div>`;
    }

    function renderLlmsTxtStatus(diag) {
        const llm = diag.llmstxt;
        if (!llm) return '';
        const existing = llm.existing || {};
        const hasFile = existing.exists;
        const sections = llm.sections || {};
        const pagesAnalyzed = llm.pages_analyzed || 0;

        return `
        <div class="diag-section">
            <h2 class="section-title">llms.txt 狀態</h2>
            <p class="section-desc">llms.txt 是新興標準，告訴 AI 系統你的網站上最重要的內容。類似 robots.txt 但用途相反 — 主動邀請 AI 來讀取。</p>
            <div class="card mb-40">
                <div class="llmstxt-status">
                    <span class="llmstxt-badge ${hasFile ? 'exists' : 'missing'}">${hasFile ? '✓ 已存在' : '✗ 未找到'}</span>
                    <span style="font-size:13px;color:var(--text-secondary)">${hasFile ? existing.url : `${escapeHtml(STATE.websiteUrl)}/llms.txt 不存在`}</span>
                </div>

                ${hasFile && existing.format_valid ? `
                <div style="margin-bottom:16px">
                    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">格式檢查：</div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
                        <span style="color:${existing.has_title ? 'var(--neon-green)' : 'var(--red)'}">標題 ${existing.has_title ? '✓' : '✗'}</span>
                        <span style="color:${existing.has_description ? 'var(--neon-green)' : 'var(--red)'}">描述 ${existing.has_description ? '✓' : '✗'}</span>
                        <span style="color:${existing.has_sections ? 'var(--neon-green)' : 'var(--red)'}">章節 ${existing.has_sections ? '✓' : '✗'} (${existing.section_count || 0})</span>
                        <span style="color:${existing.has_links ? 'var(--neon-green)' : 'var(--red)'}">連結 ${existing.has_links ? '✓' : '✗'} (${existing.link_count || 0})</span>
                        <span style="color:${existing.full_exists ? 'var(--neon-green)' : 'var(--text-tertiary)'}">llms-full.txt ${existing.full_exists ? '✓' : '—'}</span>
                    </div>
                </div>` : ''}

                <div style="margin-bottom:16px">
                    <div style="font-size:13px;color:var(--neon-green);font-weight:600;margin-bottom:8px">系統為你生成的 llms.txt（${pagesAnalyzed} 頁分析）</div>
                    ${Object.keys(sections).length ? `
                    <div class="llmstxt-sections">
                        ${Object.entries(sections).map(([name, count]) => `<span class="llmstxt-section-tag">${escapeHtml(name)} (${count})</span>`).join('')}
                    </div>` : ''}
                </div>

                ${llm.generated_llmstxt ? `
                <div style="margin-bottom:16px">
                    <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.textContent=this.nextElementSibling.style.display==='none'?'▶ 預覽 llms.txt':'▼ 收合預覽'" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:13px;font-family:inherit;padding:0;margin-bottom:8px">▶ 預覽 llms.txt</button>
                    <div class="llmstxt-preview" style="display:none">${escapeHtml(llm.generated_llmstxt)}</div>
                </div>` : ''}

                <div class="llmstxt-actions">
                    <a class="btn-download" href="/api/llmstxt-download?url=${encodeURIComponent(STATE.websiteUrl)}&type=llmstxt" download="llms.txt">⬇ 下載 llms.txt</a>
                    <a class="btn-download" href="/api/llmstxt-download?url=${encodeURIComponent(STATE.websiteUrl)}&type=full" download="llms-full.txt">⬇ 下載 llms-full.txt</a>
                </div>
            </div>
        </div>`;
    }

    // ============ Utilities ============
    function highlightBrand(text, brand) {
        if (!brand || !text) return escapeHtml(text);
        const escaped = escapeHtml(text);
        const regex = new RegExp(`(${escapeRegex(brand)})`, 'gi');
        return escaped.replace(regex, '<mark>$1</mark>');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function escapeAttr(str) {
        return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function shortenUrl(url) {
        try {
            const u = new URL(url);
            return u.hostname + (u.pathname.length > 30 ? u.pathname.substring(0, 30) + '...' : u.pathname);
        } catch {
            return url.length > 50 ? url.substring(0, 50) + '...' : url;
        }
    }

    function bindResults() {
        document.getElementById('navHome').addEventListener('click', e => { e.preventDefault(); navigate('landing'); });
        document.getElementById('navSearchBtn').addEventListener('click', () => {
            const v = document.getElementById('navSearchInput').value.trim();
            if (v) navigate('loading', { brand: v, queries: [], competitors: [], platforms: ['gemini'] });
        });
        document.getElementById('navSearchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('navSearchBtn').click();
        });

        // Poll for diagnostics if still loading
        if (STATE.websiteUrl && !STATE.diagnostics) {
            const diagPoll = setInterval(() => {
                if (STATE.diagnostics && STATE.page === 'results') {
                    clearInterval(diagPoll);
                    // Re-render diagnostics sections in place
                    const diagPlaceholder = document.querySelector('.diag-section');
                    if (diagPlaceholder) {
                        const container = diagPlaceholder.parentElement;
                        const temp = document.createElement('div');
                        temp.innerHTML = renderDiagnostics();
                        // Replace old diag section(s) with new ones
                        const oldSections = container.querySelectorAll('.diag-section');
                        oldSections.forEach(s => s.remove());
                        container.insertAdjacentHTML('beforeend', renderDiagnostics());
                    }
                }
            }, 1000);
        }

        // Load trend data async
        if (STATE.data?.brand && !isStaticDeploy()) {
            fetch(`/api/history/trend?brand=${encodeURIComponent(STATE.data.brand)}`)
                .then(r => r.json())
                .then(trend => {
                    if (trend.points && trend.points.length >= 2) {
                        renderTrendChart(trend.points);
                    }
                })
                .catch(() => {});
        }
    }

    function renderTrendChart(points) {
        const section = document.getElementById('trendSection');
        if (!section) return;

        // Collect all platform IDs across all points
        const platformIds = new Set();
        points.forEach(p => Object.keys(p.platform_rates || {}).forEach(id => platformIds.add(id)));
        const platforms = [...platformIds];

        const platformLabels = { gemini: 'Gemini', perplexity: 'Perplexity', google_aio: 'Google AI Overview' };
        const platformColors = { gemini: '#FFD700', perplexity: '#64C8FF', google_aio: '#FF6B6B' };
        const overallColor = '#91D500';

        section.style.display = 'block';
        section.innerHTML = `
            <div class="section-title">歷史趨勢</div>
            <p class="section-desc">同品牌歷次分析的引用率變化，共 ${points.length} 筆數據</p>
            <div class="card">
                <canvas id="trendCanvas" class="trend-canvas"></canvas>
                <div class="trend-legend" id="trendLegend"></div>
            </div>`;

        // Build legend
        const legend = document.getElementById('trendLegend');
        legend.innerHTML = `<div class="trend-legend-item"><div class="trend-legend-dot" style="background:${overallColor}"></div>綜合引用率</div>` +
            platforms.map(p => `<div class="trend-legend-item"><div class="trend-legend-dot" style="background:${platformColors[p] || '#888'}"></div>${platformLabels[p] || p}</div>`).join('');

        // Draw chart
        const canvas = document.getElementById('trendCanvas');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const W = rect.width, H = rect.height;

        const padL = 50, padR = 20, padT = 20, padB = 50;
        const chartW = W - padL - padR;
        const chartH = H - padT - padB;

        // Grid + Y axis
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.font = '11px system-ui';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.textAlign = 'right';
        for (let pct = 0; pct <= 100; pct += 25) {
            const y = padT + chartH * (1 - pct / 100);
            ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
            ctx.fillText(pct + '%', padL - 8, y + 4);
        }

        // X axis labels
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        const n = points.length;
        points.forEach((p, i) => {
            const x = padL + (n === 1 ? chartW / 2 : chartW * i / (n - 1));
            const d = new Date(p.date);
            const label = `${d.getMonth() + 1}/${d.getDate()}`;
            ctx.fillText(label, x, H - padB + 18);
            // Time below date
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fillText(`${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`, x, H - padB + 32);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
        });

        // Draw line helper
        function drawLine(data, color, lineWidth = 2) {
            if (data.length < 2) return;
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            data.forEach((val, i) => {
                const x = padL + (n === 1 ? chartW / 2 : chartW * i / (n - 1));
                const y = padT + chartH * (1 - (val ?? 0) / 100);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Dots
            ctx.fillStyle = color;
            data.forEach((val, i) => {
                const x = padL + (n === 1 ? chartW / 2 : chartW * i / (n - 1));
                const y = padT + chartH * (1 - (val ?? 0) / 100);
                ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
            });
        }

        // Draw platform lines (thinner, behind)
        platforms.forEach(pid => {
            const data = points.map(p => p.platform_rates?.[pid] ?? null).map(v => v ?? 0);
            drawLine(data, platformColors[pid] || '#888', 1.5);
        });

        // Draw overall line (thicker, on top)
        drawLine(points.map(p => p.overall_rate), overallColor, 3);
    }

    // ============ Lightbox ============
    function openLightbox(title, src) {
        const isSvg = src.endsWith('.svg');
        const overlay = document.createElement('div');
        overlay.className = 'lightbox-overlay';
        overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
        overlay.innerHTML = `
            <div class="lightbox-content">
                <div class="lightbox-header">
                    <h4>🖼 ${title}</h4>
                    <button class="lightbox-close" onclick="this.closest('.lightbox-overlay').remove()">✕</button>
                </div>
                <div class="lightbox-body">
                    ${isSvg
                        ? `<object data="${src}" type="image/svg+xml" style="width:100%;min-height:400px"></object>`
                        : `<img src="${src}" alt="${title}">`}
                </div>
                <div class="lightbox-footer">
                    品牌：${STATE.brand} | ${title} | ${new Date().toLocaleDateString('zh-TW')}
                </div>
            </div>`;
        document.body.appendChild(overlay);
        const onKey = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
        document.addEventListener('keydown', onKey);
    }

    // ============ PDF Export ============
    function exportPDF() {
        const d = STATE.data;
        if (!d) return;

        const btn = document.querySelector('.btn-pdf');
        if (btn) { btn.textContent = '⏳ 生成中...'; btn.disabled = true; }

        const s = d.summary;
        const platforms = d.platforms || [];
        const results = d.results || [];
        const domains = d.source_domains || {};
        const verdictLabels = { good: '表現良好', warning: '有改善空間', bad: '需要關注' };
        const posLabels = { title: '標題', first: '首位', middle: '中段', end: '末段', none: '—' };

        // Group results by query
        const queryMap = {};
        results.forEach(r => {
            if (!queryMap[r.query]) queryMap[r.query] = {};
            queryMap[r.query][r.platform] = r;
        });
        const queries = Object.keys(queryMap);
        const platformIds = platforms.map(p => p.id);

        // Source domains top 10
        const domainEntries = Object.entries(domains).sort((a, b) => b[1] - a[1]).slice(0, 10);
        const domainTotal = Object.values(domains).reduce((s, c) => s + c, 0);

        const report = document.createElement('div');
        report.style.cssText = 'position:absolute;left:-9999px;top:0;width:210mm;font-family:Inter,-apple-system,sans-serif;color:#1a1a1a;background:#fff;padding:32px;';
        report.innerHTML = `
            <div style="border-bottom:3px solid #059669;padding-bottom:24px;margin-bottom:32px">
                <div style="display:flex;justify-content:space-between;align-items:flex-end">
                    <div>
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
                            <div style="width:40px;height:40px;background:#059669;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700">G</div>
                            <div style="font-size:11px;color:#059669;text-transform:uppercase;letter-spacing:3px;font-weight:700">GEO Analyzer Report</div>
                        </div>
                        <div style="font-size:32px;font-weight:700;color:#1a1a1a">${d.brand}</div>
                    </div>
                    <div style="text-align:right;font-size:12px;color:#6b7280">
                        <div>AI 品牌可見度分析報告</div>
                        <div>分析日期：${new Date(d.generated_at || Date.now()).toLocaleDateString('zh-TW')}</div>
                        <div>平台：${platforms.map(p => p.name).join('、')}</div>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div style="background:#f0fdf4;border:2px solid #059669;border-radius:8px;padding:24px;margin-bottom:32px;text-align:center">
                <div style="font-size:48px;font-weight:700;color:#059669">${s.overall_rate}%</div>
                <div style="font-size:16px;color:#374151;margin-top:8px">綜合引用率 — ${s.total_mentioned} / ${s.total_queries} 個查詢被 AI 引用</div>
                <div style="display:inline-block;margin-top:12px;padding:4px 12px;background:${s.verdict === 'good' ? '#dcfce7' : s.verdict === 'warning' ? '#fef9c3' : '#fee2e2'};border-radius:4px;font-size:12px;font-weight:700;color:${s.verdict === 'good' ? '#166534' : s.verdict === 'warning' ? '#854d0e' : '#991b1b'}">${verdictLabels[s.verdict] || s.verdict}</div>
            </div>

            <!-- Platform Coverage -->
            <div style="margin-bottom:32px">
                <div style="font-size:16px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid #e5e7eb;padding-bottom:8px">各平台引用率</div>
                <div style="display:flex;gap:16px;flex-wrap:wrap">
                    ${platforms.map(p => `
                    <div style="flex:1;min-width:140px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:16px;text-align:center">
                        <div style="font-size:20px;margin-bottom:4px">${p.icon}</div>
                        <div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:8px">${p.name}</div>
                        <div style="font-size:28px;font-weight:700;color:#059669">${p.citation_rate}%</div>
                        <div style="font-size:11px;color:#9ca3af;margin-top:4px">${p.mentioned_count} / ${p.queries_count} 查詢</div>
                    </div>`).join('')}
                </div>
            </div>

            <!-- Query Matrix -->
            <div style="margin-bottom:32px">
                <div style="font-size:16px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid #e5e7eb;padding-bottom:8px">查詢 × 平台 結果矩陣</div>
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                    <thead>
                        <tr style="background:#f3f4f6">
                            <th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">查詢</th>
                            ${platforms.map(p => `<th style="padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">${p.name}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${queries.map(query => {
                            const row = queryMap[query];
                            return `<tr>
                                <td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-weight:500">${query}</td>
                                ${platformIds.map(pid => {
                                    const r = row[pid];
                                    if (!r) return `<td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;color:#9ca3af">—</td>`;
                                    if (r.error) return `<td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;color:#d97706">⚠ 錯誤</td>`;
                                    if (r.brand_mentioned) return `<td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;color:#059669;font-weight:700">✓ ${posLabels[r.mention_position] || ''}</td>`;
                                    return `<td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;color:#dc2626">✗</td>`;
                                }).join('')}
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>

            <!-- Source Domains -->
            ${domainEntries.length > 0 ? `
            <div style="margin-bottom:32px">
                <div style="font-size:16px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid #e5e7eb;padding-bottom:8px">AI 引用來源排行</div>
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                    <thead>
                        <tr style="background:#f3f4f6">
                            <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">網域</th>
                            <th style="padding:8px 12px;text-align:right;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">引用次數</th>
                            <th style="padding:8px 12px;text-align:right;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059679">佔比</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${domainEntries.map(([domain, count]) => {
                            const pct = (count / domainTotal * 100).toFixed(1);
                            const brandLower = d.brand.toLowerCase().replace(/\s/g, '');
                            const isBrand = domain.toLowerCase().includes(brandLower);
                            return `<tr${isBrand ? ' style="background:#f0fdf4"' : ''}>
                                <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-weight:${isBrand ? '700;color:#059669' : '500'}">${domain}${isBrand ? ' ⭐' : ''}</td>
                                <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right">${count}</td>
                                <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right;color:#6b7280">${pct}%</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
                <div style="margin-top:8px;font-size:11px;color:#9ca3af">共 ${Object.keys(domains).length} 個不同網域，${domainTotal} 次引用</div>
            </div>` : ''}

            <!-- Competitor Comparison -->
            ${(d.competitors && d.competitors.length > 0) ? `
            <div style="margin-bottom:32px">
                <div style="font-size:16px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid #e5e7eb;padding-bottom:8px">品牌 vs 競品 對比</div>
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                    <thead>
                        <tr style="background:#f3f4f6">
                            <th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">品牌</th>
                            <th style="padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">綜合引用率</th>
                            ${platforms.map(p => `<th style="padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;border-bottom:2px solid #059669">${p.name}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="background:#f0fdf4">
                            <td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-weight:700;color:#059669">${d.brand} (你)</td>
                            <td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;font-weight:700;color:#059669">${s.overall_rate}%</td>
                            ${platforms.map(p => `<td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;font-weight:600">${p.citation_rate}%</td>`).join('')}
                        </tr>
                        ${d.competitors.map(c => `
                        <tr>
                            <td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;font-weight:500">${c.brand}</td>
                            <td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center;font-weight:700">${c.overall_rate != null ? c.overall_rate + '%' : '—'}</td>
                            ${platforms.map(mainP => {
                                const cp = (c.platforms || []).find(p => p.id === mainP.id);
                                return `<td style="padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:center">${cp ? cp.citation_rate + '%' : '—'}</td>`;
                            }).join('')}
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>` : ''}

            <!-- Footer -->
            <div style="margin-top:40px;padding-top:16px;border-top:2px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#9ca3af">
                <div style="display:flex;align-items:center;gap:8px">
                    <div style="width:16px;height:16px;background:#059669;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:700">G</div>
                    <span>Powered by GEO Analyzer — AI 品牌可見度分析工具</span>
                </div>
                <div>${new Date().toLocaleDateString('zh-TW')} ${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'})}</div>
            </div>
        `;

        document.body.appendChild(report);

        const filename = `GEO-Report-${d.brand}-${new Date().toISOString().split('T')[0]}.pdf`;

        html2pdf().set({
            margin: [10, 10, 10, 10],
            filename: filename,
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
        }).from(report).save().then(() => {
            report.remove();
            if (btn) { btn.textContent = '📄 匯出 PDF 報告'; btn.disabled = false; }
        }).catch(err => {
            console.error('PDF export failed:', err);
            report.remove();
            if (btn) { btn.textContent = '📄 匯出 PDF 報告'; btn.disabled = false; }
            alert('PDF 匯出失敗，請重試');
        });
    }

    // ============ Init ============
    render();
    </script>
