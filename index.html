<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Analyzer — AI 品牌可見度分析</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    /* ============ Landing ============ */
    .landing { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .landing-logo { font-size: 14px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 16px; }
    .landing h1 { font-size: 56px; font-weight: 700; color: var(--text-primary); text-align: center; margin-bottom: 12px; line-height: 1.2; }
    .landing h1 span { color: var(--neon-green); }
    .landing .tagline { font-size: 18px; color: var(--text-secondary); text-align: center; margin-bottom: 48px; max-width: 600px; }

    .search-form { width: 100%; max-width: 560px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 16px 20px; background: var(--black-card); border: 2px solid var(--border-color); border-radius: var(--border-radius); color: var(--text-primary); font-size: 18px; font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--neon-green); box-shadow: 0 0 12px rgba(145,213,0,0.2); }
    .form-input::placeholder { color: var(--text-tertiary); }
    .form-input-sm { font-size: 14px; padding: 12px 16px; }
    .form-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }

    .advanced-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-tertiary); cursor: pointer; margin-bottom: 16px; transition: color 0.2s; background: none; border: none; font-family: inherit; }
    .advanced-toggle:hover { color: var(--neon-green); }
    .advanced-toggle .arrow { display: inline-block; transition: transform 0.2s; }
    .advanced-toggle.open .arrow { transform: rotate(90deg); }
    .advanced-fields { display: none; }
    .advanced-fields.open { display: block; }

    .btn-analyze { width: 100%; padding: 18px; background: var(--neon-green); color: #000; border: none; border-radius: var(--border-radius); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; margin-top: 8px; }
    .btn-analyze:hover { background: var(--neon-bright); box-shadow: var(--shadow-glow); transform: translateY(-1px); }

    .demo-note { margin-top: 24px; font-size: 12px; color: var(--text-tertiary); text-align: center; }
    .demo-note a { color: var(--neon-green); text-decoration: none; }

    /* ============ Loading ============ */
    .analysis-loading { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .loading-brand { font-size: 14px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .loading-title { font-size: 32px; font-weight: 700; color: var(--text-primary); margin-bottom: 40px; text-align: center; }
    .loading-steps { width: 100%; max-width: 480px; }
    .step { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
    .step:last-child { border-bottom: none; }
    .step-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .step-pending .step-icon { border: 2px solid var(--border-color); color: var(--text-tertiary); }
    .step-active .step-icon { border: 2px solid var(--neon-green); color: var(--neon-green); animation: pulse 1s infinite; }
    .step-done .step-icon { background: var(--neon-green); color: #000; border: none; }
    .step-label { font-size: 14px; font-weight: 500; }
    .step-pending .step-label { color: var(--text-tertiary); }
    .step-active .step-label { color: var(--text-primary); }
    .step-done .step-label { color: var(--neon-green); }
    .step-time { margin-left: auto; font-size: 12px; color: var(--text-tertiary); }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(145,213,0,0.4); } 50% { box-shadow: 0 0 0 8px rgba(145,213,0,0); } }

    .loading-queries { margin-top: 32px; width: 100%; max-width: 480px; }
    .loading-queries h4 { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .query-tag { display: inline-block; padding: 4px 10px; margin: 3px; background: rgba(145,213,0,0.08); border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; color: var(--text-secondary); }

    /* ============ Hero Summary ============ */
    .hero-summary { background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: var(--border-neon); border-radius: var(--border-radius); padding: 32px; margin-bottom: 32px; box-shadow: var(--shadow-neon); }
    .hero-headline { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1.5; margin-bottom: 20px; }
    .hero-headline .hl-brand { color: var(--neon-green); }
    .hero-headline .hl-bad { color: var(--red); }
    .hero-headline .hl-good { color: var(--neon-green); }
    .hero-highlights { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-highlight { flex: 1; min-width: 200px; padding: 12px 16px; background: rgba(145,213,0,0.05); border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; color: var(--text-secondary); }
    .hero-highlight .hi-icon { margin-right: 8px; }

    /* ============ Results Nav ============ */
    .nav-search { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .nav-search input { padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary); font-size: 12px; font-family: inherit; width: 160px; }
    .nav-search input:focus { outline: none; border-color: var(--neon-green); }
    .nav-search button { padding: 6px 12px; background: var(--neon-green); color: #000; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

    /* ============ Results context ============ */
    .results-context { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .context-brand { font-size: 20px; font-weight: 700; color: var(--neon-green); }
    .context-sep { color: var(--border-color); }
    .context-queries { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ============ Dashboard ============ */
    .metric-value { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
    .metric-value .value { font-size: 36px; font-weight: 700; color: var(--neon-green); text-shadow: 0 0 10px rgba(191,255,0,0.4); }
    .trend { font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 4px; background: rgba(191,255,0,0.1); }
    .metric-header h3 { font-size: 16px; font-weight: 700; color: var(--neon-green); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .metric-description { font-size: 13px; color: var(--text-tertiary); }
    .metric-footer { font-size: 12px; color: var(--text-tertiary); margin-top: 12px; }
    .platform-card { text-align: center; cursor: pointer; }
    .platform-card h4 { font-size: 12px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .platform-icon { font-size: 28px; margin-bottom: 12px; }
    .coverage-value { font-size: 28px; font-weight: 700; color: var(--accent-yellow); margin-bottom: 8px; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--accent-yellow); margin-bottom: 8px; }
    .stat-meta { font-size: 13px; color: var(--text-tertiary); }
    .chart-wrap { background: var(--black-card); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 32px; }
    .chart-container { position: relative; height: 300px; }
    .trend-badge { font-weight: 700; font-size: 16px; }
    .query-name { font-weight: 500; }
    .top-query .query-name { color: var(--accent-yellow); font-weight: 600; }

    /* ============ Readiness ============ */
    .score-circle { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--neon-green); border-radius: 50%; font-size: 32px; font-weight: 700; color: var(--neon-green); margin: 0 auto 16px; }
    .score-status { font-size: 16px; font-weight: 600; color: var(--neon-green); text-align: center; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-header h3 { font-size: 15px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 0.5px; }
    .score-badge { background: transparent; color: var(--accent-yellow); padding: 4px 12px; border-radius: 4px; font-size: 13px; font-weight: 700; border: 1px solid var(--accent-yellow); }
    .eval-items { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .eval-items li { font-size: 13px; padding: 4px 0; }
    .eval-items .positive { color: var(--neon-green); }
    .eval-items .caution { color: var(--accent-yellow); }
    .improvement-item { display: flex; gap: 16px; align-items: flex-start; }
    .improvement-item.priority-high { border-left: 4px solid var(--red); background: rgba(255,68,68,0.05); }
    .improvement-item.priority-medium { border-left: 4px solid var(--accent-yellow); background: rgba(253,224,82,0.05); }
    .priority-badge { min-width: 50px; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: center; border: 1px solid; }
    .priority-high .priority-badge { color: var(--red); border-color: var(--red); }
    .priority-medium .priority-badge { color: var(--accent-yellow); border-color: var(--accent-yellow); }
    .item-content { flex: 1; }
    .item-content h4 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--neon-green); text-transform: uppercase; }
    .item-content p { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
    .impact { display: inline-block; background: rgba(145,213,0,0.1); color: var(--neon-green); padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; border: 1px solid var(--neon-green); }
    .timeline { display: flex; flex-direction: column; gap: 24px; position: relative; padding-left: 40px; }
    .timeline::before { content: ''; position: absolute; left: 12px; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--neon-green), var(--accent-yellow)); }
    .timeline-item { position: relative; }
    .timeline-marker { position: absolute; left: -40px; top: 0; width: 30px; height: 30px; background: var(--neon-green); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 3px solid var(--black-bg); }
    .timeline-content ul { list-style: none; }
    .timeline-content h4 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--neon-green); text-transform: uppercase; }
    .timeline-content li { font-size: 13px; color: var(--text-secondary); padding: 4px 0 4px 16px; position: relative; }
    .timeline-content li::before { content: '→'; position: absolute; left: 0; color: var(--neon-green); font-weight: 700; }
    .improvements-list { display: flex; flex-direction: column; gap: 16px; }

    /* ============ Competitive ============ */
    .rank-number { font-size: 48px; font-weight: 700; color: var(--neon-green); }
    .rank-label { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; font-weight: 700; margin-top: 4px; }
    .overview-stat { font-size: 16px; color: var(--text-secondary); margin-top: 12px; font-weight: 500; }
    .overview-card { text-align: center; }
    .your-brand { border-left: 3px solid var(--neon-green); }
    .your-brand td { background: rgba(145,213,0,0.03); }
    .opportunity-card { border-left: 4px solid var(--border-color); }
    .opportunity-card h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
    .opportunity-card.priority-high { border-left-color: var(--red); }
    .opportunity-card.priority-high h4 { color: var(--red); }
    .opportunity-card.priority-medium { border-left-color: var(--accent-yellow); }
    .opportunity-card.priority-medium h4 { color: var(--accent-yellow); }
    .opportunity-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .opportunity-desc { font-size: 13px; color: var(--text-secondary); }
    .strategy-phase h3 { font-size: 15px; font-weight: 700; color: var(--neon-green); margin-bottom: 16px; text-transform: uppercase; }
    .strategy-phase ul { list-style: none; }
    .strategy-phase li { font-size: 13px; color: var(--text-secondary); padding: 6px 0 6px 16px; position: relative; }
    .strategy-phase li::before { content: '→'; position: absolute; left: 0; color: var(--neon-green); font-weight: 700; }

    /* ============ CTA ============ */
    .cta-section { background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 32px; text-align: center; }
    .cta-section h3 { font-size: 20px; font-weight: 700; color: var(--neon-green); margin-bottom: 12px; }
    .cta-section p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
    .cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-cta { padding: 12px 24px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; transition: all 0.2s; border: none; font-family: inherit; }
    .btn-cta-primary { background: var(--neon-green); color: #000; }
    .btn-cta-primary:hover { background: var(--neon-bright); box-shadow: var(--shadow-glow); }
    .btn-cta-secondary { background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); }
    .btn-cta-secondary:hover { background: rgba(145,213,0,0.1); }

    /* ============ Tabs ============ */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 32px; background: var(--black-card); padding: 4px; border-radius: var(--border-radius); border: 1px solid var(--border-color); }
    .tab-btn { flex: 1; padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text-tertiary); background: none; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; font-family: inherit; }
    .tab-btn:hover { color: var(--text-primary); background: rgba(145,213,0,0.05); }
    .tab-btn.active { color: #000; background: var(--neon-green); }

    /* ============ Lightbox ============ */
    .lightbox-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 40px; cursor: pointer; }
    .lightbox-content { max-width: 960px; width: 100%; background: var(--black-card); border: 1px solid var(--border-color); border-radius: var(--border-radius); overflow: hidden; cursor: default; }
    .lightbox-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .lightbox-header h4 { font-size: 14px; color: var(--neon-green); text-transform: uppercase; }
    .lightbox-close { background: none; border: none; color: var(--text-tertiary); font-size: 24px; cursor: pointer; padding: 4px 8px; }
    .lightbox-close:hover { color: var(--text-primary); }
    .lightbox-body { padding: 0; }
    .lightbox-body img, .lightbox-body object { width: 100%; display: block; }
    .lightbox-footer { padding: 12px 20px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-tertiary); }

    /* ============ Screenshot link ============ */
    .screenshot-link { color: var(--neon-green); cursor: pointer; font-size: 12px; text-decoration: none; opacity: 0.7; transition: opacity 0.2s; }
    .screenshot-link:hover { opacity: 1; text-decoration: underline; }

    /* ============ PDF button ============ */
    .btn-pdf { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: transparent; color: var(--accent-yellow); border: 2px solid var(--accent-yellow); border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; font-family: inherit; }
    .btn-pdf:hover { background: rgba(253,224,82,0.1); box-shadow: 0 0 12px rgba(253,224,82,0.3); }

    /* ============ Report actions bar ============ */
    .report-actions { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 24px; }

    @media (max-width: 768px) {
        .landing h1 { font-size: 32px; }
        .nav-search { display: none; }
        .hero-highlights { flex-direction: column; }
        .hero-headline { font-size: 18px; }
    }
    @media (max-width: 480px) {
        .landing h1 { font-size: 24px; }
        .tab-btn { font-size: 11px; padding: 10px 8px; }
        .form-input { font-size: 16px; }
    }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    // ============ State ============
    // pages: 'landing' | 'loading' | 'results-overview' | 'results-readiness' | 'results-competitive'
    const STATE = { page: 'landing', brand: '', queries: [], competitors: [], data: null };

    function navigate(page, opts = {}) {
        Object.assign(STATE, opts, { page });
        render();
    }

    function render() {
        const app = document.getElementById('app');
        switch (STATE.page) {
            case 'landing': app.innerHTML = renderLanding(); bindLanding(); break;
            case 'loading': app.innerHTML = renderLoading(); startLoading(); break;
            case 'results-overview': app.innerHTML = renderResultsOverview(); bindResults(); break;
            case 'results-readiness': app.innerHTML = renderResultsReadiness(); bindResults(); break;
            case 'results-competitive': app.innerHTML = renderResultsCompetitive(); bindResults(); break;
        }
    }

    // ============ Landing ============
    function renderLanding() {
        return `
        <div class="landing">
            <div class="landing-logo">GEO Analyzer</div>
            <h1>你的品牌在 <span>AI 搜尋</span><br>被看見了嗎？</h1>
            <p class="tagline">輸入品牌名稱，即時分析在 ChatGPT、Perplexity、Gemini 等 AI 平台的引用表現</p>

            <form class="search-form" id="searchForm">
                <div class="form-group">
                    <label class="form-label">品牌名稱</label>
                    <input class="form-input" id="inputBrand" type="text" placeholder="輸入你的品牌名稱" required autofocus>
                </div>

                <button type="button" class="advanced-toggle" id="advToggle">
                    <span class="arrow">▶</span> 進階選項（關鍵詞、競品）
                </button>

                <div class="advanced-fields" id="advFields">
                    <div class="form-group">
                        <label class="form-label">分析關鍵詞 <span style="color:var(--text-tertiary)">選填</span></label>
                        <input class="form-input form-input-sm" id="inputQueries" type="text" placeholder="逗號分隔，例如：AI 行銷工具, SEO 自動化">
                        <div class="form-hint">不填的話，系統會根據品牌名稱自動生成相關查詢</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">競品名稱 <span style="color:var(--text-tertiary)">選填</span></label>
                        <input class="form-input form-input-sm" id="inputCompetitors" type="text" placeholder="逗號分隔，例如：HubSpot, SEMrush">
                    </div>
                </div>

                <button class="btn-analyze" type="submit">開始分析</button>
            </form>

            <div class="demo-note">
                <a href="#" id="tryDemo">試試看：分析 ChannelLab 的 AI 可見度 →</a>
            </div>
        </div>`;
    }

    function bindLanding() {
        const toggle = document.getElementById('advToggle');
        const fields = document.getElementById('advFields');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('open');
            fields.classList.toggle('open');
        });

        document.getElementById('searchForm').addEventListener('submit', e => {
            e.preventDefault();
            const brand = document.getElementById('inputBrand').value.trim();
            if (!brand) return;
            const queriesVal = document.getElementById('inputQueries').value;
            const compsVal = document.getElementById('inputCompetitors').value;
            const queries = queriesVal ? queriesVal.split(',').map(s => s.trim()).filter(Boolean).slice(0, 10) : [];
            const competitors = compsVal ? compsVal.split(',').map(s => s.trim()).filter(Boolean).slice(0, 5) : [];
            navigate('loading', { brand, queries, competitors });
        });

        document.getElementById('tryDemo').addEventListener('click', e => {
            e.preventDefault();
            navigate('loading', {
                brand: 'ChannelLab',
                queries: ['台灣 AI 行銷顧問', 'GEO 優化是什麼', 'AI 搜尋引擎優化服務', '品牌 AI 可見度提升', 'ChatGPT 品牌引用策略'],
                competitors: ['Neil Patel Digital', 'HubSpot', 'SEMrush', 'Moz']
            });
        });
    }

    // ============ Loading ============
    function renderLoading() {
        const steps = [
            { icon: '🔍', label: '掃描 Perplexity...' },
            { icon: '✨', label: '掃描 Gemini...' },
            { icon: '🤖', label: '掃描 ChatGPT...' },
            { icon: '🧠', label: '語意情感分析...' },
            { icon: '📊', label: '生成分析報告...' },
        ];
        return `
        <div class="analysis-loading">
            <div class="loading-brand">${STATE.brand}</div>
            <div class="loading-title">正在分析 AI 可見度...</div>
            <div class="loading-steps">
                ${steps.map((s, i) => `
                <div class="step step-pending" id="step-${i}">
                    <div class="step-icon">${s.icon}</div>
                    <div class="step-label">${s.label}</div>
                    <div class="step-time" id="step-time-${i}"></div>
                </div>`).join('')}
            </div>
            ${STATE.queries.length ? `
            <div class="loading-queries">
                <h4>分析關鍵詞</h4>
                ${STATE.queries.map(q => `<span class="query-tag">${q}</span>`).join('')}
            </div>` : ''}
        </div>`;
    }

    function startLoading() {
        const apiUrl = `/api/analyze?brand=${encodeURIComponent(STATE.brand)}&queries=${encodeURIComponent(STATE.queries.join(','))}&competitors=${encodeURIComponent(STATE.competitors.join(','))}`;
        const apiPromise = fetch(apiUrl)
            .then(r => { if (!r.ok) throw new Error('API error'); return r.json(); })
            .then(d => { if (d.error) throw new Error(d.error); return d; })
            .catch(() => fetch('data/mock_data.json').then(r => r.json()));

        let current = 0;
        const total = 5;
        const interval = setInterval(() => {
            if (current > 0) {
                const prev = document.getElementById(`step-${current-1}`);
                if (prev) {
                    prev.className = 'step step-done';
                    prev.querySelector('.step-icon').textContent = '✓';
                    document.getElementById(`step-time-${current-1}`).textContent = (0.4 + Math.random() * 1.0).toFixed(1) + 's';
                }
            }
            if (current < total) {
                const el = document.getElementById(`step-${current}`);
                if (el) el.className = 'step step-active';
            }
            current++;
            if (current > total) {
                clearInterval(interval);
                apiPromise.then(data => {
                    substituteData(data);
                    STATE.data = data;
                    setTimeout(() => navigate('results-overview'), 400);
                });
            }
        }, 650);
    }

    function substituteData(data) {
        const orig = data.brand;
        const origComps = [...(data.competitors || [])];
        data.brand = STATE.brand;

        // Competitive table "you" row + competitor rows
        const ct = data.competitive && data.competitive.competitors_table;
        if (ct) ct.forEach(r => { if (r.is_you) r.brand = STATE.brand + ' (你)'; });

        // Top queries substitution if user provided custom queries
        if (STATE.queries.length && data.dashboard && data.dashboard.top_queries) {
            const tq = data.dashboard.top_queries;
            STATE.queries.forEach((q, i) => { if (i < tq.length) tq[i].query = q; });
            if (STATE.queries.length < tq.length) data.dashboard.top_queries = tq.slice(0, Math.max(STATE.queries.length, 5));
        }

        // Competitors substitution
        const actualComps = STATE.competitors.length ? STATE.competitors : origComps;
        if (STATE.competitors.length) {
            data.competitors = STATE.competitors;
            if (ct) {
                let ci = 0;
                ct.forEach(r => { if (!r.is_you && ci < STATE.competitors.length) { r.brand = STATE.competitors[ci++]; } });
            }
            if (data.competitive && data.competitive.leader) {
                data.competitive.leader.name = STATE.competitors[0];
            }
        }

        // Headline: replace brand + competitor names
        if (data.summary && data.summary.headline) {
            let hl = data.summary.headline.replace(orig, STATE.brand);
            for (const oc of origComps) {
                if (hl.includes(oc) && actualComps.length) {
                    hl = hl.replace(oc, actualComps[0]);
                    break;
                }
            }
            data.summary.headline = hl;
        }
    }

        <div class="cta-section mb-40">
            <h3>準備好超越競品了嗎？</h3>
            <p>從 AI-Readiness 改善項目開始執行，30 天就能看到引用率提升</p>
            <div class="cta-buttons">
                <button class="btn-cta btn-cta-primary" onclick="navigate('landing')">分析其他品牌 →</button>
                <button class="btn-cta btn-cta-secondary" onclick="switchTab('dashboard')">回到總覽</button>
            </div>
        </div>`;
    }

    // ============ Helpers ============
    function switchTab(tab) {
        STATE.tab = tab;
        render();
    }

    // ============ Lightbox ============
    function openLightbox(query, src) {
        const isSvg = src.endsWith('.svg');
        const overlay = document.createElement('div');
        overlay.className = 'lightbox-overlay';
        overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
        overlay.innerHTML = `
            <div class="lightbox-content">
                <div class="lightbox-header">
                    <h4>🖼 AI 回覆截圖 — ${query}</h4>
                    <button class="lightbox-close" onclick="this.closest('.lightbox-overlay').remove()">✕</button>
                </div>
                <div class="lightbox-body">
                    ${isSvg
                        ? `<object data="${src}" type="image/svg+xml" style="width:100%;min-height:400px"></object>`
                        : `<img src="${src}" alt="Screenshot: ${query}">`}
                </div>
                <div class="lightbox-footer">
                    品牌：${STATE.brand} | 查詢：${query} | ${new Date().toLocaleDateString('zh-TW')}
                </div>
            </div>`;
        document.body.appendChild(overlay);
        // Close on Escape
        const onKey = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
        document.addEventListener('keydown', onKey);
    }

    // ============ PDF Export ============
    function exportPDF() {
        // Use browser print with a print-friendly layout
        const style = document.createElement('style');
        style.id = 'print-style';
        style.textContent = `
            @media print {
                .nav-bar, .nav-search, .report-actions, .btn-cta, .cta-section, .tab-bar, .screenshot-link { display: none !important; }
                body { background: #fff !important; color: #000 !important; }
                .page-container { max-width: 100% !important; padding: 0 !important; }
                .card, .hero-summary { background: #f9f9f9 !important; border-color: #ddd !important; box-shadow: none !important; color: #000 !important; }
                .section-title, .card-header h3, .metric-header h3, h1, h2, h3, h4 { color: #111 !important; text-shadow: none !important; }
                .metric-value .value, .coverage-value, .stat-value, .rank-number { color: #059669 !important; text-shadow: none !important; }
                .hero-headline, .hero-headline .hl-brand { color: #000 !important; }
                .hero-headline .hl-good { color: #059669 !important; }
                .hero-headline .hl-bad { color: #dc2626 !important; }
                .bar-fill { background: #059669 !important; box-shadow: none !important; }
                .bar-track { background: #e5e7eb !important; border-color: #d1d5db !important; }
                .badge, .status { border-color: #666 !important; }
                .text-neon, .neon-glow, .trend-up { color: #059669 !important; }
                .trend-down { color: #dc2626 !important; }
                .data-table thead { background: #f3f4f6 !important; border-color: #d1d5db !important; }
                .data-table th { color: #374151 !important; }
                .hero-highlight { background: #f0fdf4 !important; border-color: #bbf7d0 !important; color: #374151 !important; }
                .results-context { margin-bottom: 16px !important; }
                .context-brand { color: #059669 !important; }
                .query-tag { background: #f3f4f6 !important; border-color: #d1d5db !important; color: #374151 !important; }
                * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                @page { margin: 1.5cm; size: A4; }
                .page-container::before { content: 'GEO Analyzer Report — ${STATE.brand} — ${new Date().toLocaleDateString("zh-TW")}'; display: block; font-size: 10px; color: #9ca3af; margin-bottom: 16px; }
            }
        `;
        document.head.appendChild(style);
        window.print();
        setTimeout(() => style.remove(), 1000);
    }

    // ============ Init ============
    render();
    </script>
</body>
</html>
