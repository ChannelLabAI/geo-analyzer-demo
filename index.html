<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Analyzer — AI 品牌可見度分析</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
    /* ============ Landing ============ */
    .landing { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .landing-logo { font-size: 14px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 16px; }
    .landing h1 { font-size: 56px; font-weight: 700; color: var(--text-primary); text-align: center; margin-bottom: 12px; line-height: 1.2; }
    .landing h1 span { color: var(--neon-green); }
    .landing .tagline { font-size: 18px; color: var(--text-secondary); text-align: center; margin-bottom: 48px; max-width: 600px; }

    .search-form { width: 100%; max-width: 560px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 16px 20px; background: var(--black-card); border: 2px solid var(--border-color); border-radius: var(--border-radius); color: var(--text-primary); font-size: 18px; font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--neon-green); box-shadow: 0 0 12px rgba(145,213,0,0.2); }
    .form-input::placeholder { color: var(--text-tertiary); }
    .form-input-sm { font-size: 14px; padding: 12px 16px; }
    .form-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }

    .advanced-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-tertiary); cursor: pointer; margin-bottom: 16px; transition: color 0.2s; background: none; border: none; font-family: inherit; }
    .advanced-toggle:hover { color: var(--neon-green); }
    .advanced-toggle .arrow { display: inline-block; transition: transform 0.2s; }
    .advanced-toggle.open .arrow { transform: rotate(90deg); }
    .advanced-fields { display: none; }
    .advanced-fields.open { display: block; }

    .btn-analyze { width: 100%; padding: 18px; background: var(--neon-green); color: #000; border: none; border-radius: var(--border-radius); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; margin-top: 8px; }
    .btn-analyze:hover { background: var(--neon-bright); box-shadow: var(--shadow-glow); transform: translateY(-1px); }

    /* ============ Loading ============ */
    .analysis-loading { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .loading-brand { font-size: 14px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .loading-title { font-size: 32px; font-weight: 700; color: var(--text-primary); margin-bottom: 40px; text-align: center; }
    .loading-steps { width: 100%; max-width: 480px; }
    .step { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
    .step:last-child { border-bottom: none; }
    .step-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .step-pending .step-icon { border: 2px solid var(--border-color); color: var(--text-tertiary); }
    .step-active .step-icon { border: 2px solid var(--neon-green); color: var(--neon-green); animation: pulse 1s infinite; }
    .step-done .step-icon { background: var(--neon-green); color: #000; border: none; }
    .step-label { font-size: 14px; font-weight: 500; }
    .step-pending .step-label { color: var(--text-tertiary); }
    .step-active .step-label { color: var(--text-primary); }
    .step-done .step-label { color: var(--neon-green); }
    .step-time { margin-left: auto; font-size: 12px; color: var(--text-tertiary); }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(145,213,0,0.4); } 50% { box-shadow: 0 0 0 8px rgba(145,213,0,0); } }

    .loading-queries { margin-top: 32px; width: 100%; max-width: 480px; }
    .loading-queries h4 { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .query-tag { display: inline-block; padding: 4px 10px; margin: 3px; background: rgba(145,213,0,0.08); border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; color: var(--text-secondary); }

    /* ============ Summary Banner ============ */
    .summary-banner { background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: var(--border-neon); border-radius: var(--border-radius); padding: 40px 32px; margin-bottom: 32px; box-shadow: var(--shadow-neon); text-align: center; }
    .summary-rate { font-size: 72px; font-weight: 700; color: var(--neon-green); margin-bottom: 8px; text-shadow: 0 0 20px rgba(145,213,0,0.4); }
    .summary-headline { font-size: 18px; color: var(--text-secondary); margin-bottom: 16px; }
    .summary-verdict { display: inline-block; padding: 6px 16px; border-radius: 4px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .verdict-good { background: rgba(145,213,0,0.15); color: var(--neon-green); border: 1px solid var(--neon-green); }
    .verdict-warning { background: rgba(255,170,0,0.15); color: var(--amber); border: 1px solid var(--amber); }
    .verdict-bad { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid var(--red); }

    /* ============ Platform Cards ============ */
    .platform-card { text-align: center; }
    .platform-icon { font-size: 32px; margin-bottom: 12px; }
    .platform-card h4 { font-size: 12px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .platform-rate { font-size: 36px; font-weight: 700; color: var(--accent-yellow); margin-bottom: 4px; }
    .platform-detail { font-size: 12px; color: var(--text-tertiary); margin-bottom: 12px; }

    /* ============ Query Matrix ============ */
    .matrix-table { width: 100%; border-collapse: collapse; }
    .matrix-table th { padding: 12px 16px; text-align: center; font-weight: 700; font-size: 12px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; background: rgba(145,213,0,0.05); border-bottom: 2px solid var(--neon-green); }
    .matrix-table th:first-child { text-align: left; }
    .matrix-table td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 14px; }
    .matrix-table td:first-child { text-align: left; font-weight: 500; color: var(--text-primary); }
    .matrix-table tbody tr { transition: background-color 0.2s; cursor: pointer; }
    .matrix-table tbody tr:hover { background: rgba(145,213,0,0.05); }
    .matrix-table tbody tr:last-child td { border-bottom: none; }

    .cell-cited { color: var(--neon-green); font-weight: 700; font-size: 18px; }
    .cell-not-cited { color: var(--red); font-size: 18px; opacity: 0.6; }
    .cell-no-data { color: var(--text-tertiary); font-size: 14px; }
    .cell-error { color: var(--amber); font-size: 14px; }

    .position-tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-left: 4px; }
    .pos-first { background: rgba(145,213,0,0.15); color: var(--neon-green); }
    .pos-middle { background: rgba(100,200,255,0.15); color: var(--blue); }
    .pos-end { background: rgba(255,170,0,0.15); color: var(--amber); }

    /* ============ Source Domains ============ */
    .source-bar { margin-bottom: 12px; }
    .source-bar-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .source-domain { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .source-domain.is-brand { color: var(--neon-green); font-weight: 700; }
    .source-count { font-size: 12px; color: var(--text-tertiary); }

    /* ============ Detail Panel ============ */
    .detail-panel { background: var(--black-card); border: 1px solid var(--neon-green); border-radius: var(--border-radius); padding: 24px; margin-bottom: 24px; }
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .detail-header h3 { font-size: 18px; font-weight: 700; color: var(--neon-green); }
    .detail-close { background: none; border: 1px solid var(--border-color); color: var(--text-tertiary); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
    .detail-close:hover { border-color: var(--neon-green); color: var(--neon-green); }
    .detail-results { display: flex; flex-direction: column; gap: 16px; }
    .detail-result { background: var(--black-hover); border: 1px solid var(--border-color); border-radius: 6px; padding: 16px; }
    .detail-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .detail-platform-name { font-size: 14px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; }
    .detail-status { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
    .detail-status.cited { background: rgba(145,213,0,0.15); color: var(--neon-green); }
    .detail-status.not-cited { background: rgba(255,68,68,0.15); color: var(--red); }
    .detail-snippet { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 4px; max-height: 200px; overflow-y: auto; }
    .detail-snippet mark { background: rgba(145,213,0,0.3); color: var(--neon-green); padding: 1px 3px; border-radius: 2px; }
    .detail-sources { font-size: 12px; color: var(--text-tertiary); }
    .detail-sources a { color: var(--blue); text-decoration: none; }
    .detail-sources a:hover { text-decoration: underline; }
    .detail-screenshot { margin-top: 12px; }
    .detail-screenshot img { max-width: 100%; border: 1px solid var(--border-color); border-radius: 4px; }
    .screenshot-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-tertiary); border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
    .screenshot-btn:hover { border-color: var(--neon-green); color: var(--neon-green); }

    /* ============ Nav Search ============ */
    .nav-search { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .nav-search input { padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary); font-size: 12px; font-family: inherit; width: 160px; }
    .nav-search input:focus { outline: none; border-color: var(--neon-green); }
    .nav-search button { padding: 6px 12px; background: var(--neon-green); color: #000; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

    /* ============ Results context ============ */
    .results-context { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .context-brand { font-size: 20px; font-weight: 700; color: var(--neon-green); }
    .context-sep { color: var(--border-color); }
    .context-queries { display: flex; gap: 6px; flex-wrap: wrap; }
    .context-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 24px; }

    /* ============ Report Actions ============ */
    .report-actions { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 24px; }
    .btn-pdf { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: transparent; color: var(--accent-yellow); border: 2px solid var(--accent-yellow); border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; font-family: inherit; }
    .btn-pdf:hover { background: rgba(253,224,82,0.1); box-shadow: 0 0 12px rgba(253,224,82,0.3); }

    /* ============ Lightbox ============ */
    .lightbox-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 40px; cursor: pointer; }
    .lightbox-content { max-width: 960px; width: 100%; background: var(--black-card); border: 1px solid var(--border-color); border-radius: var(--border-radius); overflow: hidden; cursor: default; }
    .lightbox-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .lightbox-header h4 { font-size: 14px; color: var(--neon-green); text-transform: uppercase; }
    .lightbox-close { background: none; border: none; color: var(--text-tertiary); font-size: 24px; cursor: pointer; padding: 4px 8px; }
    .lightbox-close:hover { color: var(--text-primary); }
    .lightbox-body { padding: 0; }
    .lightbox-body img, .lightbox-body object { width: 100%; display: block; }
    .lightbox-footer { padding: 12px 20px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-tertiary); }

    /* ============ Comparison ============ */
    .comparison-table { width: 100%; border-collapse: collapse; }
    .comparison-table th { padding: 12px 16px; text-align: center; font-weight: 700; font-size: 12px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; background: rgba(145,213,0,0.05); border-bottom: 2px solid var(--neon-green); }
    .comparison-table th:first-child { text-align: left; }
    .comparison-table td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); text-align: center; font-size: 14px; }
    .comparison-table td:first-child { text-align: left; font-weight: 600; }
    .comparison-table tbody tr:last-child td { border-bottom: none; }
    .comparison-table .is-you { color: var(--neon-green); }
    .comparison-table .is-you td { background: rgba(145,213,0,0.03); }

    .comp-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .comp-bar { height: 20px; border-radius: 3px; min-width: 4px; transition: width 0.6s ease; }
    .comp-bar.bar-you { background: linear-gradient(90deg, var(--neon-green), var(--neon-bright)); }
    .comp-bar.bar-comp { background: rgba(100,200,255,0.6); }
    .comp-bar-label { font-size: 13px; font-weight: 700; min-width: 45px; }

    .comp-error { color: var(--text-tertiary); font-style: italic; font-size: 13px; }

    /* ============ Trend Chart ============ */
    .trend-canvas { width: 100%; height: 280px; }
    .trend-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .trend-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
    .trend-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ============ History ============ */
    .history-section { width: 100%; max-width: 560px; margin-top: 48px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .history-header h3 { font-size: 14px; font-weight: 700; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; }
    .history-count { font-size: 12px; color: var(--text-tertiary); }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: var(--black-card); border: 1px solid var(--border-color); border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s; }
    .history-item:hover { border-color: var(--neon-green); background: rgba(145,213,0,0.03); }
    .history-brand { font-size: 15px; font-weight: 700; color: var(--text-primary); flex: 1; }
    .history-rate { font-size: 18px; font-weight: 700; min-width: 50px; text-align: right; }
    .history-rate.good { color: var(--neon-green); }
    .history-rate.warning { color: var(--amber); }
    .history-rate.bad { color: var(--red); }
    .history-meta { font-size: 11px; color: var(--text-tertiary); min-width: 100px; text-align: right; }
    .history-mode { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
    .history-mode.live { background: rgba(145,213,0,0.15); color: var(--neon-green); }
    .history-mode.demo { background: rgba(100,200,255,0.15); color: var(--blue); }
    .history-delete { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; padding: 4px 8px; opacity: 0; transition: opacity 0.2s; }
    .history-item:hover .history-delete { opacity: 1; }
    .history-delete:hover { color: var(--red); }

    /* ============ Website Diagnostics ============ */
    .diag-section { margin-top: 48px; }
    .diag-section .section-title { margin-bottom: 8px; }
    .diag-section .section-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
    .diag-loading { text-align: center; padding: 32px; color: var(--text-tertiary); font-size: 14px; }
    .diag-loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border-color); border-top-color: var(--neon-green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Crawler Check */
    .crawler-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .crawler-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--black-hover); border: 1px solid var(--border-color); border-radius: 6px; }
    .crawler-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .crawler-dot.allowed { background: var(--neon-green); box-shadow: 0 0 6px rgba(145,213,0,0.4); }
    .crawler-dot.blocked { background: var(--red); box-shadow: 0 0 6px rgba(255,68,68,0.4); }
    .crawler-dot.allowed_default { background: var(--amber); }
    .crawler-info { flex: 1; min-width: 0; }
    .crawler-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .crawler-meta { font-size: 11px; color: var(--text-tertiary); }
    .crawler-score { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .crawler-score-num { font-size: 48px; font-weight: 700; }
    .crawler-score-label { font-size: 13px; color: var(--text-secondary); }
    .crawler-tier { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 16px; margin-bottom: 8px; }

    /* Citability */
    .citability-header { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
    .citability-score-ring { width: 100px; height: 100px; position: relative; }
    .citability-score-ring svg { transform: rotate(-90deg); }
    .citability-score-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .citability-stats { flex: 1; min-width: 200px; }
    .citability-stats-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-color); font-size: 13px; }
    .citability-stats-row:last-child { border-bottom: none; }
    .citability-grade-dist { display: flex; gap: 8px; margin-bottom: 20px; }
    .citability-grade { text-align: center; flex: 1; padding: 8px; background: var(--black-hover); border-radius: 6px; }
    .citability-grade-letter { font-size: 18px; font-weight: 700; }
    .citability-grade-count { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
    .grade-A { color: var(--neon-green); }
    .grade-B { color: var(--blue); }
    .grade-C { color: var(--accent-yellow); }
    .grade-D { color: var(--amber); }
    .grade-F { color: var(--red); }
    .citability-block { padding: 14px; background: var(--black-hover); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 10px; }
    .citability-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .citability-block-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .citability-block-grade { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .citability-block-preview { font-size: 12px; color: var(--text-tertiary); line-height: 1.5; }
    .citability-dim { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .citability-dim-label { font-size: 11px; color: var(--text-secondary); min-width: 120px; }
    .citability-dim-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .citability-dim-fill { height: 100%; border-radius: 3px; background: var(--neon-green); }
    .citability-dim-val { font-size: 11px; color: var(--text-tertiary); min-width: 28px; text-align: right; }

    /* llms.txt */
    .llmstxt-status { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .llmstxt-badge { padding: 6px 14px; border-radius: 4px; font-size: 13px; font-weight: 700; }
    .llmstxt-badge.exists { background: rgba(145,213,0,0.15); color: var(--neon-green); }
    .llmstxt-badge.missing { background: rgba(255,68,68,0.15); color: var(--red); }
    .llmstxt-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .btn-download { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green); border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; font-family: inherit; text-decoration: none; }
    .btn-download:hover { background: rgba(145,213,0,0.1); box-shadow: 0 0 12px rgba(145,213,0,0.3); }
    .llmstxt-preview { background: var(--black-hover); border: 1px solid var(--border-color); border-radius: 6px; padding: 16px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; max-height: 300px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; }
    .llmstxt-sections { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .llmstxt-section-tag { padding: 4px 10px; background: rgba(145,213,0,0.08); border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; color: var(--text-secondary); }

    /* ============ Responsive ============ */
    @media (max-width: 768px) {
        .landing h1 { font-size: 32px; }
        .nav-search { display: none; }
        .summary-rate { font-size: 48px; }
        .summary-banner { padding: 24px 16px; }
        .comparison-table td, .comparison-table th { padding: 10px 8px; font-size: 12px; }
        .comp-bar-wrap { flex-direction: column; align-items: flex-start; gap: 4px; }
        .history-item { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
        .history-meta { min-width: auto; text-align: left; }
        .trend-canvas { height: 220px; }
    }
    @media (max-width: 480px) {
        .landing h1 { font-size: 24px; }
        .landing .tagline { font-size: 14px; }
        .form-input { font-size: 16px; }
        .matrix-table { font-size: 12px; }
        .matrix-table td, .matrix-table th { padding: 8px; }
        .platform-rate { font-size: 28px; }
        .detail-panel { padding: 16px; }
        .results-context { flex-direction: column; align-items: flex-start; }
        .report-actions { justify-content: center; }
    }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
    // ============ State ============
    const STATE = { page: 'landing', brand: '', queries: [], competitors: [], data: null, selectedQuery: null, websiteUrl: '', diagnostics: null };

    function navigate(page, opts = {}) {
        Object.assign(STATE, opts, { page });
        render();
    }

    function render() {
        const app = document.getElementById('app');
        switch (STATE.page) {
            case 'landing': app.innerHTML = renderLanding(); bindLanding(); break;
            case 'loading': app.innerHTML = renderLoading(); startLoading(); break;
            case 'results': app.innerHTML = renderResults(); bindResults(); break;
        }
    }

    // ============ Landing ============
    function renderLanding() {
        return `
        <div class="landing">
            <div class="landing-logo">GEO Analyzer</div>
            <h1>你的品牌在 <span>AI 搜尋</span><br>被看見了嗎？</h1>
            <p class="tagline">即時分析品牌在 Gemini、Perplexity、Google AI Overview 的引用表現，追蹤趨勢、比較競品，掌握 AI 搜尋可見度</p>

            <form class="search-form" id="searchForm">
                <div class="form-group">
                    <label class="form-label">品牌名稱</label>
                    <input class="form-input" id="inputBrand" type="text" placeholder="輸入你的品牌名稱" required autofocus>
                </div>

                <button type="button" class="advanced-toggle" id="advToggle">
                    <span class="arrow">▶</span> 進階選項（關鍵詞、競品、平台）
                </button>

                <div class="advanced-fields" id="advFields">
                    <div class="form-group">
                        <label class="form-label">分析關鍵詞 <span style="color:var(--text-tertiary)">選填</span></label>
                        <input class="form-input form-input-sm" id="inputQueries" type="text" placeholder="逗號分隔，例如：AI 行銷工具, SEO 自動化">
                        <div class="form-hint">不填的話，系統會以品牌名稱作為查詢</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">競品比較 <span style="color:var(--text-tertiary)">選填，最多 3 個</span></label>
                        <input class="form-input form-input-sm" id="inputCompetitors" type="text" placeholder="逗號分隔，例如：HubSpot, SEMrush, Moz">
                        <div class="form-hint">加入競品後，系統會用同一組查詢分析每個競品的 AI 引用表現</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">網站 URL <span style="color:var(--text-tertiary)">選填，用於網站診斷</span></label>
                        <input class="form-input form-input-sm" id="inputWebsiteUrl" type="url" placeholder="https://www.example.com">
                        <div class="form-hint">輸入品牌官網 URL，系統會同時進行 AI 爬蟲檢測、內容可引用性評分、llms.txt 分析</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">分析平台 <span style="color:var(--text-tertiary)">選填</span></label>
                        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer">
                                <input type="checkbox" id="platGemini" checked style="accent-color:var(--neon-green)"> ✨ Gemini
                            </label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer">
                                <input type="checkbox" id="platPerplexity" style="accent-color:var(--neon-green)"> 🔍 Perplexity
                            </label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer">
                                <input type="checkbox" id="platGoogleAIO" style="accent-color:var(--neon-green)"> 🔗 Google AI Overview
                            </label>
                        </div>
                    </div>
                </div>

                <button class="btn-analyze" type="submit">開始分析</button>
            </form>

            <div class="history-section" id="historySection" style="display:none">
                <div class="history-header">
                    <h3>歷史分析</h3>
                    <span class="history-count" id="historyCount"></span>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>`;
    }

    function bindLanding() {
        const toggle = document.getElementById('advToggle');
        const fields = document.getElementById('advFields');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('open');
            fields.classList.toggle('open');
        });

        document.getElementById('searchForm').addEventListener('submit', e => {
            e.preventDefault();
            const brand = document.getElementById('inputBrand').value.trim();
            if (!brand) return;
            const queriesVal = document.getElementById('inputQueries').value;
            const queries = queriesVal ? queriesVal.split(',').map(s => s.trim()).filter(Boolean).slice(0, 10) : [];

            const compsVal = document.getElementById('inputCompetitors').value;
            const competitors = compsVal ? compsVal.split(',').map(s => s.trim()).filter(Boolean).slice(0, 3) : [];

            const platforms = [];
            if (document.getElementById('platGemini').checked) platforms.push('gemini');
            if (document.getElementById('platPerplexity').checked) platforms.push('perplexity');
            if (document.getElementById('platGoogleAIO').checked) platforms.push('google_aio');

            const websiteUrl = document.getElementById('inputWebsiteUrl').value.trim();
            navigate('loading', { brand, queries, competitors, platforms: platforms.length ? platforms : ['gemini'], websiteUrl, diagnostics: null });
        });

        loadHistory();
    }

    function loadHistory() {
        if (isStaticDeploy()) return;
        fetch('/api/history?limit=20')
            .then(r => r.json())
            .then(records => {
                const section = document.getElementById('historySection');
                const list = document.getElementById('historyList');
                const count = document.getElementById('historyCount');
                if (!records.length) return;

                section.style.display = 'block';
                count.textContent = `${records.length} 筆`;
                list.innerHTML = records.map(r => {
                    const rate = r.overall_rate != null ? r.overall_rate : '—';
                    const verdict = r.verdict || 'bad';
                    const mode = r.live_mode ? 'live' : 'demo';
                    const date = new Date(r.created_at).toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const comps = r.competitors ? ` vs ${r.competitors}` : '';
                    return `
                    <div class="history-item" data-id="${r.id}">
                        <div>
                            <div class="history-brand">${r.brand}${comps ? `<span style="font-size:12px;color:var(--text-tertiary);font-weight:400">${comps}</span>` : ''}</div>
                            <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
                                <span class="history-mode ${mode}">${mode}</span>
                                <span style="font-size:11px;color:var(--text-tertiary)">${r.platforms || ''}</span>
                            </div>
                        </div>
                        <div class="history-rate ${verdict}">${rate === '—' ? '—' : rate + '%'}</div>
                        <div class="history-meta">${date}</div>
                        <button class="history-delete" data-delete-id="${r.id}" title="刪除">✕</button>
                    </div>`;
                }).join('');

                list.querySelectorAll('.history-item').forEach(el => {
                    el.addEventListener('click', e => {
                        if (e.target.closest('.history-delete')) return;
                        const id = el.dataset.id;
                        loadHistoryDetail(id);
                    });
                });

                list.querySelectorAll('.history-delete').forEach(btn => {
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        const id = btn.dataset.deleteId;
                        if (!confirm('確定刪除此筆分析紀錄？')) return;
                        fetch(`/api/history/${id}`, { method: 'DELETE' })
                            .then(() => loadHistory())
                            .catch(err => console.error('Delete failed:', err));
                    });
                });
            })
            .catch(() => {});
    }

    function loadHistoryDetail(id) {
        fetch(`/api/history/${id}`)
            .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
            .then(record => {
                STATE.data = record.data;
                STATE.brand = record.brand;
                STATE.queries = record.queries ? record.queries.split(',').map(s => s.trim()).filter(Boolean) : [];
                STATE.competitors = record.competitors ? record.competitors.split(',').map(s => s.trim()).filter(Boolean) : [];
                navigate('results');
            })
            .catch(err => alert('載入失敗：' + err.message));
    }

    // ============ Loading ============
    function renderLoading() {
        const platformLabels = { gemini: '✨ Gemini', perplexity: '🔍 Perplexity', google_aio: '🔗 Google AI Overview' };
        const selectedPlatforms = STATE.platforms || ['gemini'];
        const steps = selectedPlatforms.map(p => ({ icon: platformLabels[p]?.charAt(0) || '🤖', label: `掃描 ${platformLabels[p] || p}（${STATE.brand}）...` }));
        if (STATE.competitors.length) {
            STATE.competitors.forEach(c => { steps.push({ icon: '🏢', label: `分析競品 ${c}...` }); });
        }
        if (STATE.websiteUrl) {
            steps.push({ icon: '🔍', label: `診斷網站 ${STATE.websiteUrl}...` });
        }
        steps.push({ icon: '📊', label: '生成分析報告...' });

        return `
        <div class="analysis-loading">
            <div class="loading-brand">${STATE.brand}</div>
            <div class="loading-title">正在分析 AI 可見度...</div>
            <div class="loading-steps">
                ${steps.map((s, i) => `
                <div class="step step-pending" id="step-${i}">
                    <div class="step-icon">${s.icon}</div>
                    <div class="step-label">${s.label}</div>
                    <div class="step-time" id="step-time-${i}"></div>
                </div>`).join('')}
            </div>
            <div style="margin-top:24px;font-size:13px;color:var(--text-tertiary);text-align:center">
                預估時間：${STATE.competitors.length ? '2-3 分鐘（含競品分析）' : '30-60 秒'}
            </div>
            ${STATE.queries.length ? `
            <div class="loading-queries">
                <h4>分析關鍵詞</h4>
                ${STATE.queries.map(q => `<span class="query-tag">${q}</span>`).join('')}
            </div>` : ''}
        </div>`;
    }

    function isStaticDeploy() {
        return location.hostname.includes('github.io') || location.protocol === 'file:';
    }

    function fetchWithTimeout(url, timeoutMs = 180000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
    }

    function startLoading() {
        const platforms = (STATE.platforms || ['gemini']).join(',');
        const apiUrl = `/api/analyze?brand=${encodeURIComponent(STATE.brand)}&queries=${encodeURIComponent(STATE.queries.join(','))}&competitors=${encodeURIComponent(STATE.competitors.join(','))}&platforms=${encodeURIComponent(platforms)}`;

        const apiPromise = isStaticDeploy()
            ? fetch('data/mock_data.json?v=' + Date.now()).then(r => r.json())
            : fetchWithTimeout(apiUrl)
                .then(r => {
                    if (!r.ok) throw new Error(r.status === 504 ? '分析逾時，請減少查詢數量後重試' : r.status === 400 ? '請輸入有效的品牌名稱' : `伺服器錯誤 (${r.status})`);
                    return r.json();
                })
                .then(d => { if (d.error) throw new Error(d.error); return d; })
                .catch(err => {
                    if (err.name === 'AbortError') throw new Error('連線逾時，請確認網路狀態後重試');
                    throw err;
                });

        // Fire website diagnostics in parallel if URL provided
        if (STATE.websiteUrl && !isStaticDeploy()) {
            fetchWithTimeout(`/api/website-diagnostics?url=${encodeURIComponent(STATE.websiteUrl)}`, 120000)
                .then(r => r.json())
                .then(data => { STATE.diagnostics = data; })
                .catch(err => { STATE.diagnostics = { error: err.message || 'Diagnostics failed' }; });
        } else if (STATE.websiteUrl && isStaticDeploy()) {
            fetch('data/mock_diagnostics.json?v=' + Date.now())
                .then(r => r.json())
                .then(data => { STATE.diagnostics = data; })
                .catch(() => { STATE.diagnostics = { error: 'Mock diagnostics not available' }; });
        }

        let apiDone = false, apiData = null, apiError = null;
        apiPromise
            .then(data => { apiData = data; })
            .catch(err => { apiError = err; })
            .finally(() => { apiDone = true; });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        const total = steps.length;
        const startTime = Date.now();

        const animInterval = setInterval(() => {
            if (current > 0) {
                const prev = document.getElementById(`step-${current-1}`);
                if (prev) {
                    prev.className = 'step step-done';
                    prev.querySelector('.step-icon').textContent = '✓';
                    document.getElementById(`step-time-${current-1}`).textContent = (0.4 + Math.random() * 1.0).toFixed(1) + 's';
                }
            }
            if (current < total) {
                const el = document.getElementById(`step-${current}`);
                if (el) el.className = 'step step-active';
            }
            current++;
            if (current > total) {
                clearInterval(animInterval);
                pollForResults();
            }
        }, 650);

        function pollForResults() {
            const loadingTitle = document.querySelector('.loading-title');
            const poll = setInterval(() => {
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                if (loadingTitle) loadingTitle.textContent = `正在等待 AI 分析回應... (${elapsed}s)`;

                if (apiDone) {
                    clearInterval(poll);
                    if (apiData) {
                        STATE.data = apiData;
                        setTimeout(() => navigate('results'), 400);
                    } else {
                        showLoadingError(apiError?.message || apiError || '未知錯誤');
                    }
                } else if (Date.now() - startTime > 180000) {
                    clearInterval(poll);
                    showLoadingError('分析逾時（3分鐘），請減少查詢或競品數量後重試');
                }
            }, 1000);
        }
    }

    function showLoadingError(message) {
        const loadingTitle = document.querySelector('.loading-title');
        if (loadingTitle) {
            loadingTitle.innerHTML = `<span style="color:var(--red)">分析失敗</span>`;
        }
        const steps = document.querySelector('.loading-steps');
        if (steps) {
            steps.innerHTML = `
                <div style="text-align:center;padding:24px 0">
                    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.6">${message}</div>
                    <button onclick="navigate('loading',{brand:STATE.brand,queries:STATE.queries,competitors:STATE.competitors,platforms:STATE.platforms})"
                        style="padding:12px 32px;background:var(--neon-green);color:#000;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:12px">重試</button>
                    <button onclick="navigate('landing')"
                        style="padding:12px 32px;background:transparent;color:var(--text-secondary);border:1px solid var(--border-color);border-radius:6px;font-size:14px;cursor:pointer;font-family:inherit">返回首頁</button>
                </div>`;
        }
    }

    // ============ Results Page ============
    function renderResults() {
        if (!STATE.data) return '';
        const d = STATE.data;

        return `
        <nav class="nav-bar">
            <div class="nav-inner">
                <a class="nav-brand" href="javascript:void(0)" id="navHome">GEO Analyzer</a>
                <div class="nav-search">
                    <input type="text" id="navSearchInput" placeholder="分析其他品牌...">
                    <button id="navSearchBtn">分析</button>
                </div>
            </div>
        </nav>
        <div class="page-container" data-exportable="true">
            <!-- Context -->
            <div class="results-context">
                <span class="context-brand">${d.brand}</span>
                ${STATE.queries.length ? `<span class="context-sep">|</span>
                <div class="context-queries">${STATE.queries.slice(0,5).map(q => `<span class="query-tag">${q}</span>`).join('')}</div>` : ''}
            </div>
            <div class="context-meta">分析時間：${new Date(d.generated_at || Date.now()).toLocaleString('zh-TW')} | 平台：${d.platforms.map(p => p.name).join('、')}</div>

            <!-- Report Actions -->
            <div class="report-actions">
                <button class="btn-pdf" onclick="exportPDF()">📄 匯出 PDF 報告</button>
            </div>

            <!-- Summary Banner -->
            ${renderSummary(d)}

            <!-- Platform Cards -->
            <h2 class="section-title">各平台引用率</h2>
            <div class="grid-${Math.min(d.platforms.length, 3)} mb-40">
                ${d.platforms.map(p => renderPlatformCard(p)).join('')}
            </div>

            <!-- Query × Platform Matrix -->
            <h2 class="section-title">查詢 × 平台 結果矩陣</h2>
            <p style="font-size:13px;color:var(--text-secondary);margin:-16px 0 20px">每一格代表該查詢在該平台的引用結果。點擊任一列查看詳細內容。</p>
            <div class="card mb-40" style="padding:0;overflow-x:auto">
                ${renderQueryMatrix(d)}
            </div>

            <!-- Detail Panel (hidden by default) -->
            <div id="detailPanel"></div>

            <!-- Competitor Comparison -->
            ${renderComparison(d)}

            <!-- Trend Chart (loaded async, only if ≥2 data points) -->
            <div id="trendSection" style="display:none"></div>

            <!-- Source Domains -->
            ${renderSourceDomains(d)}

            <!-- Website Diagnostics -->
            ${STATE.websiteUrl ? renderDiagnostics() : ''}
        </div>`;
    }

    function renderSummary(d) {
        const s = d.summary;
        const verdictLabels = { good: '表現良好', warning: '有改善空間', bad: '需要關注' };
        return `
        <div class="summary-banner mb-40">
            <div class="summary-rate">${s.overall_rate}%</div>
            <div class="summary-headline">${d.brand} 在 AI 搜尋的綜合引用率 — ${s.total_mentioned} / ${s.total_queries} 個查詢被引用</div>
            <div class="summary-verdict verdict-${s.verdict}">${verdictLabels[s.verdict] || s.verdict}</div>
        </div>`;
    }

    function renderPlatformCard(p) {
        const posCounts = p.position_counts || {};
        const firstCount = (posCounts.title || 0) + (posCounts.first || 0);
        return `
        <div class="card platform-card">
            <div class="platform-icon">${p.icon}</div>
            <h4>${p.name}</h4>
            <div class="platform-rate">${p.citation_rate}%</div>
            <div class="platform-detail">${p.mentioned_count} / ${p.queries_count} 查詢被引用</div>
            <div class="bar-track" style="height:6px"><div class="bar-fill" style="width:${p.citation_rate}%"></div></div>
            ${firstCount > 0 ? `<div style="margin-top:8px;font-size:11px;color:var(--neon-green)">首位引用 ${firstCount} 次</div>` : ''}
        </div>`;
    }

    function renderQueryMatrix(d) {
        const results = d.results || [];
        const platforms = d.platforms || [];

        // Group results by query
        const queryMap = {};
        results.forEach(r => {
            if (!queryMap[r.query]) queryMap[r.query] = {};
            queryMap[r.query][r.platform] = r;
        });

        const queries = Object.keys(queryMap);
        if (queries.length === 0) return '<div style="padding:24px;color:var(--text-tertiary)">沒有查詢結果</div>';

        const platformIds = platforms.map(p => p.id);

        return `
        <table class="matrix-table">
            <thead>
                <tr>
                    <th style="min-width:200px">查詢</th>
                    ${platforms.map(p => `<th>${p.icon} ${p.name}</th>`).join('')}
                </tr>
            </thead>
            <tbody>
                ${queries.map(query => {
                    const row = queryMap[query];
                    return `
                    <tr onclick="showQueryDetail('${escapeAttr(query)}')">
                        <td>${query}</td>
                        ${platformIds.map(pid => {
                            const r = row[pid];
                            if (!r) return `<td><span class="cell-no-data">—</span></td>`;
                            if (r.error) return `<td><span class="cell-error" title="${escapeAttr(r.error)}">⚠</span></td>`;
                            if (r.brand_mentioned) {
                                const pos = r.mention_position;
                                const posTag = pos === 'first' || pos === 'title' ? '<span class="position-tag pos-first">首位</span>'
                                    : pos === 'middle' ? '<span class="position-tag pos-middle">中段</span>'
                                    : pos === 'end' ? '<span class="position-tag pos-end">末段</span>'
                                    : '';
                                return `<td><span class="cell-cited">✓</span>${posTag}</td>`;
                            }
                            return `<td><span class="cell-not-cited">✗</span></td>`;
                        }).join('')}
                    </tr>`;
                }).join('')}
            </tbody>
        </table>`;
    }

    function renderSourceDomains(d) {
        const domains = d.source_domains;
        if (!domains || Object.keys(domains).length === 0) return '';
        const entries = Object.entries(domains).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((s, [, c]) => s + c, 0);
        const top = entries.slice(0, 15);
        const maxCount = top[0]?.[1] || 1;

        return `
        <h2 class="section-title">AI 引用來源排行</h2>
        <p style="font-size:13px;color:var(--text-secondary);margin:-16px 0 20px">AI 平台回覆時引用了哪些網站？出現越多次，代表該來源對 AI 影響越大。</p>
        <div class="card mb-40">
            <div style="display:flex;gap:32px;flex-wrap:wrap">
                <div style="flex:2;min-width:300px">
                    ${top.map(([domain, count]) => {
                        const pct = (count / total * 100).toFixed(1);
                        const barW = (count / maxCount * 100).toFixed(0);
                        const brandLower = d.brand.toLowerCase().replace(/\s/g, '');
                        const isBrand = domain.toLowerCase().includes(brandLower);
                        return `
                        <div class="source-bar">
                            <div class="source-bar-header">
                                <span class="source-domain ${isBrand ? 'is-brand' : ''}">${domain}${isBrand ? ' ⭐' : ''}</span>
                                <span class="source-count">${count} 次 (${pct}%)</span>
                            </div>
                            <div class="bar-track" style="height:6px"><div class="bar-fill" style="width:${barW}%"></div></div>
                        </div>`;
                    }).join('')}
                </div>
                <div style="flex:1;min-width:200px">
                    <div class="card" style="background:rgba(145,213,0,0.05);border-color:var(--neon-green)">
                        <h4 style="font-size:12px;color:var(--neon-green);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">統計</h4>
                        <ul style="list-style:none;font-size:13px;color:var(--text-secondary)">
                            <li style="margin-bottom:8px">→ 共 <strong style="color:var(--text-primary)">${entries.length}</strong> 個不同網域被引用</li>
                            <li style="margin-bottom:8px">→ 共 <strong style="color:var(--text-primary)">${total}</strong> 次引用</li>
                            <li>→ <strong style="color:var(--text-primary)">${top[0]?.[0]}</strong> 是最常被引用的來源</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ============ Competitor Comparison ============
    function renderComparison(d) {
        const comps = d.competitors;
        if (!comps || comps.length === 0) return '';

        const platforms = d.platforms || [];
        const allBrands = [
            { brand: d.brand, overall_rate: d.summary.overall_rate, platforms: d.platforms, is_you: true },
            ...comps.map(c => ({ ...c, is_you: false }))
        ];

        // Find max rate for bar scaling
        const maxRate = Math.max(...allBrands.map(b => b.overall_rate || 0), 1);

        return `
        <h2 class="section-title">品牌 vs 競品 對比</h2>
        <p style="font-size:13px;color:var(--text-secondary);margin:-16px 0 20px">同一組查詢在同一平台的引用率比較，所有數據來自真實 AI 分析。</p>

        <!-- Overall Comparison Bar Chart -->
        <div class="card mb-40">
            <h3 style="font-size:14px;font-weight:700;color:var(--neon-green);text-transform:uppercase;letter-spacing:1px;margin-bottom:20px">綜合引用率</h3>
            ${allBrands.map(b => {
                const rate = b.overall_rate;
                const barW = rate != null ? (rate / maxRate * 100).toFixed(0) : 0;
                return `
                <div style="margin-bottom:16px">
                    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                        <span style="font-size:14px;font-weight:${b.is_you ? '700' : '500'};color:${b.is_you ? 'var(--neon-green)' : 'var(--text-primary)'}">${b.brand}${b.is_you ? ' (你)' : ''}</span>
                        <span style="font-size:14px;font-weight:700;color:${b.is_you ? 'var(--neon-green)' : 'var(--accent-yellow)'}">${rate != null ? rate + '%' : '—'}</span>
                    </div>
                    ${rate != null ? `
                    <div class="bar-track" style="height:20px;border-radius:4px">
                        <div class="comp-bar ${b.is_you ? 'bar-you' : 'bar-comp'}" style="width:${barW}%;height:100%;border-radius:4px"></div>
                    </div>` : `<div class="comp-error">分析失敗</div>`}
                </div>`;
            }).join('')}
        </div>

        <!-- Per-platform Comparison Table -->
        ${platforms.length > 0 ? `
        <div class="card mb-40" style="padding:0;overflow-x:auto">
            <table class="comparison-table">
                <thead>
                    <tr>
                        <th style="min-width:150px">品牌</th>
                        <th>綜合引用率</th>
                        ${platforms.map(p => `<th>${p.icon} ${p.name}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>
                    ${allBrands.map(b => {
                        return `
                        <tr class="${b.is_you ? 'is-you' : ''}">
                            <td>${b.brand}${b.is_you ? ' (你)' : ''}</td>
                            <td style="font-weight:700;color:${b.is_you ? 'var(--neon-green)' : 'var(--accent-yellow)'}">${b.overall_rate != null ? b.overall_rate + '%' : '—'}</td>
                            ${platforms.map(mainP => {
                                if (!b.platforms || b.platforms.length === 0) return '<td class="comp-error">—</td>';
                                const cp = b.platforms.find(p => p.id === mainP.id);
                                if (!cp) return '<td class="comp-error">—</td>';
                                return `<td style="font-weight:600">${cp.citation_rate}%</td>`;
                            }).join('')}
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>` : ''}
        `;
    }

    // ============ Query Detail Panel ============
    function showQueryDetail(query) {
        const results = (STATE.data.results || []).filter(r => r.query === query);
        if (results.length === 0) return;

        STATE.selectedQuery = query;

        <div class="detail-panel">

                <h3>📋 ${query}</h3>
                <button class="detail-close" onclick="closeDetail()">✕ 關閉</button>

        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

    function closeDetail() {
        STATE.selectedQuery = null;
